name: Publish to npm

on:
  push:
    tags: ["v*"]

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Ensure tagged commit is on master
        run: |
          git fetch origin master
          git merge-base --is-ancestor "${GITHUB_SHA}" "origin/master"

      - uses: actions/setup-node@v6
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - run: npm ci
      - run: npm run build

      - name: Pack tarball
        id: pack
        run: echo "file=$(npm pack --silent)" >> "$GITHUB_OUTPUT"

      - name: Publish tarball
        run: npm publish "${{ steps.pack.outputs.file }}" --access public
